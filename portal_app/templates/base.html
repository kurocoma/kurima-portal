<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}くりまポータルツール{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    {% set nav_path = request.url.path %}
    <header class="appbar">
      <div class="appbar-inner">
        <a class="brand" href="/">
          <img class="brand-logo" src="{{ url_for('static', path='/logo.png') }}" alt="くりま">
          <span class="brand-sep" aria-hidden="true"></span>
          <span class="brand-tag">ポータルツール</span>
        </a>
        <nav class="appnav">
          <a class="appnav-link {% if nav_path == '/' %}is-active{% endif %}" href="/">ポータル</a>
          <a class="appnav-link {% if nav_path.startswith('/inventory') %}is-active{% endif %}" href="/inventory">在庫明細確認</a>
          <a class="appnav-link {% if nav_path.startswith('/yamato') %}is-active{% endif %}" href="/yamato">ヤマト伝票</a>
          <a class="appnav-link {% if nav_path.startswith('/nekopos') %}is-active{% endif %}" href="/nekopos">ネコポス</a>
          <a class="appnav-link {% if nav_path.startswith('/clickpost') %}is-active{% endif %}" href="/clickpost">クリックポスト</a>
          <a class="appnav-link {% if nav_path.startswith('/letterpack-tracking') %}is-active{% endif %}" href="/letterpack-tracking">LP番号反映</a>
          <a class="appnav-link {% if nav_path.startswith('/shipment-confirmation') %}is-active{% endif %}" href="/shipment-confirmation">出荷確定</a>
          <a class="appnav-link {% if nav_path.startswith('/access-analytics') %}is-active{% endif %}" href="/access-analytics">アクセス解析</a>
          <a class="appnav-link {% if nav_path.startswith('/billing') %}is-active{% endif %}" href="/billing">請求関連</a>
          <a class="appnav-link {% if nav_path.startswith('/price-calc') %}is-active{% endif %}" href="/price-calc">価格計算</a>
          <a class="appnav-link {% if nav_path.startswith('/jobs') %}is-active{% endif %}" href="/jobs">実行履歴<span id="nav-running-badge" class="nav-badge" title="実行中のジョブ" hidden></span></a>
          <a class="appnav-link {% if nav_path.startswith('/logs') %}is-active{% endif %}" href="/logs">ログ</a>
          <a class="appnav-link {% if nav_path.startswith('/settings') %}is-active{% endif %}" href="/settings">設定</a>
        </nav>
      </div>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <footer class="appfoot">
      <!-- 稼働バージョンの可視化（S4）: 「更新したのに直らない」＝再起動忘れの切り分け用 -->
      <span class="mono">稼働版 {{ app_version }}</span>
      <span class="appfoot-sep" aria-hidden="true">・</span>
      <span>起動 {{ app_started_at }}</span>
    </footer>
    <!-- 共通進捗スクリプト（U7/U4）: ページ側の window.KURIMA_PROGRESS 定義（content ブロック内）より
         後に読み込む必要があるため、body 末尾に置く。全ページでナビの実行中バッジも担当する。 -->
    <script src="{{ url_for('static', path='/progress.js') }}"></script>
    <script>
      // 遅延ロード: [data-lazy] のスロットを、その data-lazy URL から取得したHTMLで置き換える。
      // 重い結果セクション（プレビュー）を別エンドポイントから非同期に読み込むために使う。
      (() => {
        const slots = document.querySelectorAll("[data-lazy]");
        for (const slot of slots) {
          const url = slot.getAttribute("data-lazy");
          if (!url) continue;
          fetch(url, { cache: "no-store", headers: { "X-Requested-With": "fetch" } })
            .then((res) => {
              if (!res.ok) throw new Error("HTTP " + res.status);
              return res.text();
            })
            .then((html) => {
              slot.outerHTML = html;
            })
            .catch((error) => {
              slot.classList.remove("lazy-slot");
              slot.innerHTML =
                '<div class="note error"><div class="note-title">最新データを読み込めませんでした</div>' +
                '<p>時間をおいて再読込してください。' +
                (error && error.message ? "（" + error.message + "）" : "") +
                "</p></div>";
            });
        }
      })();
    </script>
  </body>
</html>
